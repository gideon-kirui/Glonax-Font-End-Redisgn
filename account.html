<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glonax Holdings — Client Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="main.css">
</head>
<body>

  <!-- ═══ PORTAL ═══ -->
  <div id="portal">
    <div class="overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="sidebar-logo-mark">G</div>
          <div class="sidebar-brand">Glonax Holdings<span>Client Portal</span></div>
        </div>
        <div class="profile-switcher" id="profileSwitcher"></div>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="user-avatar" id="sidebarAvatar">GK</div>
          <div>
            <div class="user-info-name" id="sidebarName">Gideon Kirui</div>
            <div class="user-info-role" id="sidebarRole">Multi-Division Client</div>
          </div>
        </div>
        <button class="logout-btn">
          <span>></span> <a href="./login.html">Sign Out</a>
        </button>
      </div>
    </aside>

    <!-- Main -->
    <div class="main-content">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:14px;">
          <button class="mobile-menu-btn" onclick="openSidebar()">☰</button>
          <div class="topbar-left">
            <div class="topbar-title" id="topbarTitle">Dashboard</div>
            <div class="topbar-sub" id="topbarSub">Welcome back, Gideon</div>
          </div>
        </div>
        <div class="topbar-right">
          <div style="display:flex;align-items:center;gap:8px;" id="divisionIndicator"></div>
          <div class="notif-btn" onclick="toggleNotif()" id="notifBtn">
            🔔
            <div class="notif-dot" id="notifDot"></div>
          </div>
        </div>
      </div>

      <div class="page-content">
        <div id="mainContent" class="fade-in"></div>
      </div>
    </div>

    <!-- Notification Panel -->
    <div class="notif-panel" id="notifPanel">
      <div class="notif-panel-header">
        <strong style="font-size:15px;">Notifications</strong>
        <button class="link-btn" style="font-size:12px;" onclick="markAllRead()">Mark all read</button>
      </div>
      <div id="notifList"></div>
    </div>
  </div>

  <!-- Change Password Modal -->
  <div class="modal-overlay" id="changePassModal">
    <div class="modal-box" style="max-width:420px;">
      <button class="modal-close" onclick="closeModal('changePassModal')">×</button>
      <h3 style="font-family:var(--font-serif);font-size:20px;margin-bottom:20px;">Change Password</h3>
      <div id="passAlert" class="alert"></div>
      <div class="form-group"><label>Current Password</label><input type="password" id="curPass" placeholder="••••••••"></div>
      <div class="form-group"><label>New Password</label><input type="password" id="newPass" placeholder="Min. 8 characters"></div>
      <div class="form-group"><label>Confirm New Password</label><input type="password" id="confPass" placeholder="Repeat new password"></div>
      <button class="btn btn-primary btn-full" onclick="changePassword()">Update Password</button>
    </div>
  </div>

  <!-- Service Request Modal -->
  <div class="modal-overlay" id="serviceModal">
    <div class="modal-box">
      <button class="modal-close" onclick="closeModal('serviceModal')">×</button>
      <h3 style="font-family:var(--font-serif);font-size:20px;margin-bottom:6px;" id="serviceModalTitle">Request Service</h3>
      <p style="font-size:13px;color:var(--text2);margin-bottom:20px;" id="serviceModalSub">Fill in the details below</p>
      <div id="serviceModalAlert" class="alert alert-success">Request submitted! We'll contact you within 24 hours.</div>
      <div class="form-group"><label>Service Type</label><select id="serviceType"></select></div>
      <div class="form-group"><label>Description</label><textarea id="serviceDesc" placeholder="Describe what you need..."></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>Preferred Date</label><input type="date" id="serviceDate"></div>
        <div class="form-group"><label>Budget (KES)</label><input type="number" id="serviceBudget" placeholder="Optional"></div>
      </div>
      <button class="btn btn-primary btn-full" onclick="submitServiceRequest()">Submit Request</button>
    </div>
  </div>
  <script src="script1.js" defer></script>
</body>
</html>
